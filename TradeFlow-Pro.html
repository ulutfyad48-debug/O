<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeFlow Pro — Order Management System</title>
<meta http-equiv="refresh" content="3;url=https://script.google.com/macros/s/AKfycbwnvFZqSLj9Tv239nbMlkSaoC6MqZgD3wSahLsrhLyva3j6mbwLKUA-ndRVNokMUaEH/exec">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: #0a0a0f;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,212,170,0.1) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(255,101,132,0.08) 0%, transparent 50%);
    animation: bgMove 6s ease-in-out infinite alternate;
  }

  @keyframes bgMove {
    from { opacity: 0.7; transform: scale(1); }
    to   { opacity: 1;   transform: scale(1.05); }
  }

  /* Grid pattern */
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 50px;
    animation: fadeUp 0.8s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo icon */
  .logo {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 28px;
    box-shadow: 0 0 60px rgba(108,99,255,0.5);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(108,99,255,0.4); }
    50%       { box-shadow: 0 0 80px rgba(108,99,255,0.7); }
  }

  /* Title */
  h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ffffff 30%, #6c63ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #6b6b88;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  /* Loading bar */
  .loading-wrap {
    width: 280px;
    margin: 0 auto 20px;
  }

  .loading-track {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .loading-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6c63ff, #00d4aa);
    border-radius: 2px;
    animation: load 3s ease-in-out forwards;
  }

  @keyframes load {
    0%   { width: 0%; }
    20%  { width: 25%; }
    60%  { width: 70%; }
    90%  { width: 90%; }
    100% { width: 100%; }
  }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #6b6b88;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* Manual button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 28px;
    padding: 14px 32px;
    background: linear-gradient(135deg, #6c63ff, #5a52e0);
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    transition: all 0.2s;
    box-shadow: 0 8px 32px rgba(108,99,255,0.35);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(108,99,255,0.5);
  }

  /* Tags */
  .tags {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 36px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    border: 1px solid;
  }

  .tag-blue   { border-color: rgba(108,99,255,0.4); color: #6c63ff; background: rgba(108,99,255,0.08); }
  .tag-green  { border-color: rgba(0,212,170,0.4);  color: #00d4aa; background: rgba(0,212,170,0.08); }
  .tag-pink   { border-color: rgba(255,101,132,0.4);color: #ff6584; background: rgba(255,101,132,0.08); }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 4px; height: 4px;
    background: #6c63ff;
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0.3;
  }

  @keyframes float {
    from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.3; }
    90%  { opacity: 0.3; }
    to   { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 480px) {
    .card { padding: 40px 24px; }
    h1 { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>

<!-- Floating particles -->
<div class="particle" style="left:10%;animation-duration:8s;animation-delay:0s;"></div>
<div class="particle" style="left:25%;animation-duration:12s;animation-delay:2s;background:#00d4aa"></div>
<div class="particle" style="left:50%;animation-duration:9s;animation-delay:4s;background:#ff6584"></div>
<div class="particle" style="left:70%;animation-duration:11s;animation-delay:1s;"></div>
<div class="particle" style="left:88%;animation-duration:7s;animation-delay:3s;background:#00d4aa"></div>

<div class="card">
  <div class="logo">📦</div>

  <h1>TradeFlow Pro</h1>
  <p class="subtitle">// Order · Affiliate · Supplier System</p>

  <div class="loading-wrap">
    <div class="loading-track">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Redirecting to system...</div>
  </div>

  <a class="btn" href="https://script.google.com/macros/s/AKfycbwnvFZqSLj9Tv239nbMlkSaoC6MqZgD3wSahLsrhLyva3j6mbwLKUA-ndRVNokMUaEH/exec">
    🚀 Open Now
  </a>

  <div class="tags">
    <span class="tag tag-blue">Orders</span>
    <span class="tag tag-green">Affiliates</span>
    <span class="tag tag-pink">Payments</span>
    <span class="tag tag-blue">Reports</span>
    <span class="tag tag-green">Live Tracking</span>
  </div>
</div>

<script>
  // Auto redirect after 3 seconds
  setTimeout(() => {
    window.location.href = "https://script.google.com/macros/s/AKfycbwnvFZqSLj9Tv239nbMlkSaoC6MqZgD3wSahLsrhLyva3j6mbwLKUA-ndRVNokMUaEH/exec";
  }, 3000);
</script>

</body>
</html>

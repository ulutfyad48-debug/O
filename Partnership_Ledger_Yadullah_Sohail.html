<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yadullah & Sohail | Partnership Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface-2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --border-focus: rgba(139,92,246,0.6);
    --accent: #8b5cf6;
    --accent-2: #06b6d4;
    --accent-glow: rgba(139,92,246,0.25);
    --text: #f1f0f5;
    --text-muted: #6b6880;
    --text-subtle: #3d3a4e;
    --error: #f87171;
    --success: #34d399;
    --badge-a-bg: rgba(99,102,241,0.12);
    --badge-a-text: #a5b4fc;
    --badge-b-bg: rgba(6,182,212,0.12);
    --badge-b-text: #67e8f9;
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --transition: 200ms cubic-bezier(0.4,0,0.2,1);
    --spring: 300ms cubic-bezier(0.34,1.56,0.64,1);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Background ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    will-change: transform;
  }
  .bg-orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
    top: -200px; left: -150px;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  .bg-orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
    bottom: -180px; right: -120px;
    animation: drift2 22s ease-in-out infinite alternate;
  }
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
  }

  @keyframes drift1 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(60px, 40px) scale(1.1); }
  }
  @keyframes drift2 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(-50px, -30px) scale(1.08); }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border);
    padding: 40px 36px 36px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 40px 80px rgba(0,0,0,0.6),
      0 0 120px rgba(139,92,246,0.06);
    animation: cardIn 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* shine line */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(139,92,246,0.3), transparent 40%, rgba(6,182,212,0.2));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.1s cubic-bezier(0.4,0,0.2,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 64px; height: 64px;
    background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(6,182,212,0.15));
    border-radius: var(--radius-md);
    border: 1px solid rgba(139,92,246,0.25);
    font-size: 28px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(139,92,246,0.2), 0 0 0 1px rgba(255,255,255,0.04) inset;
    transition: transform var(--spring), box-shadow var(--transition);
  }
  .logo-wrap:hover {
    transform: scale(1.05) rotate(-2deg);
    box-shadow: 0 12px 40px rgba(139,92,246,0.3), 0 0 0 1px rgba(255,255,255,0.06) inset;
  }

  .title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(1.5rem, 4vw, 1.85rem);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .title em {
    font-style: italic;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.01em;
  }

  /* ── Partner Badges ── */
  .badges {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
    animation: fadeUp 0.5s 0.15s cubic-bezier(0.4,0,0.2,1) both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 100px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    border: 1px solid transparent;
    transition: transform var(--spring), box-shadow var(--transition);
  }
  .badge:hover { transform: translateY(-1px); }

  .badge-a {
    background: var(--badge-a-bg);
    color: var(--badge-a-text);
    border-color: rgba(99,102,241,0.2);
  }
  .badge-b {
    background: var(--badge-b-bg);
    color: var(--badge-b-text);
    border-color: rgba(6,182,212,0.2);
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 28px;
    animation: fadeUp 0.5s 0.18s cubic-bezier(0.4,0,0.2,1) both;
  }

  /* ── Form ── */
  .form {
    animation: fadeUp 0.5s 0.2s cubic-bezier(0.4,0,0.2,1) both;
  }

  .field {
    margin-bottom: 20px;
  }

  .field-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    transition: color var(--transition);
  }
  .field:focus-within .field-label { color: var(--accent); }

  .field-label svg {
    width: 11px; height: 11px;
    opacity: 0.6;
  }

  .input-wrap {
    position: relative;
  }

  .input {
    width: 100%;
    padding: 13px 48px 13px 16px;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    transition:
      border-color var(--transition),
      box-shadow var(--transition),
      background var(--transition);
    -webkit-appearance: none;
    appearance: none;
    caret-color: var(--accent);
  }

  .input::placeholder { color: var(--text-subtle); }

  .input:focus {
    outline: none;
    border-color: var(--border-focus);
    background: rgba(28,28,39,0.9);
    box-shadow: 0 0 0 4px var(--accent-glow), 0 1px 3px rgba(0,0,0,0.3);
  }

  .input.error {
    border-color: rgba(248,113,113,0.5);
    box-shadow: 0 0 0 4px rgba(248,113,113,0.1);
    animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97);
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }

  /* password strength dot */
  .input-suffix {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    display: flex;
    align-items: center;
    padding-right: 14px;
    gap: 8px;
  }

  .pw-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-muted);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color var(--transition), background var(--transition);
    -webkit-tap-highlight-color: transparent;
  }
  .pw-toggle:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .pw-toggle:active { transform: scale(0.9); }
  .pw-toggle svg { width: 17px; height: 17px; }

  /* ── CTA Button ── */
  .btn {
    position: relative;
    width: 100%;
    padding: 14px 24px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9 50%, #5b21b6);
    border: none;
    border-radius: var(--radius-md);
    color: #fff;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    overflow: hidden;
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
    box-shadow: 0 4px 24px rgba(109,40,217,0.4), 0 1px 0 rgba(255,255,255,0.1) inset;
    -webkit-tap-highlight-color: transparent;
    margin-top: 4px;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 60%);
    pointer-events: none;
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s, opacity 0.5s;
    opacity: 0;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(109,40,217,0.5), 0 1px 0 rgba(255,255,255,0.12) inset;
  }

  .btn:active {
    transform: translateY(0) scale(0.99);
    box-shadow: 0 2px 12px rgba(109,40,217,0.4);
  }

  .btn:active::after {
    width: 300px; height: 300px;
    opacity: 0;
  }

  .btn:disabled {
    opacity: 0.65;
    cursor: not-allowed;
    transform: none;
  }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity var(--transition), transform var(--transition);
  }

  .btn-spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn.loading .btn-inner { opacity: 0; transform: translateY(-8px); }
  .btn.loading .btn-spinner { display: block; position: absolute; }

  /* ── Error / Success ── */
  .feedback {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 0.78rem;
    font-weight: 500;
    line-height: 1.4;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity var(--transition), transform var(--transition);
    pointer-events: none;
  }
  .feedback.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .feedback.error-msg {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--error);
  }
  .feedback.success-msg {
    background: rgba(52,211,153,0.08);
    border: 1px solid rgba(52,211,153,0.2);
    color: var(--success);
  }
  .feedback-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  /* ── Footer ── */
  .footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    text-align: center;
    animation: fadeUp 0.5s 0.25s cubic-bezier(0.4,0,0.2,1) both;
  }

  .footer-text {
    font-size: 0.68rem;
    color: var(--text-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .lock-icon {
    width: 10px; height: 10px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.5;
  }

  /* ── Responsive ── */
  @media (max-width: 440px) {
    .card { padding: 32px 24px 28px; border-radius: var(--radius-lg); }
    .logo-wrap { width: 56px; height: 56px; font-size: 24px; }
    .badges { flex-direction: row; flex-wrap: wrap; }
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="bg-layer" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-grid"></div>
</div>

<main class="card" role="main">

  <header class="header">
    <div class="logo-wrap" aria-hidden="true">🤝</div>
    <h1 class="title">Partnership <em>Ledger</em></h1>
    <p class="subtitle">Secure access · 50/50 profit split</p>
  </header>

  <div class="badges">
    <span class="badge badge-a"><span class="badge-dot"></span>Yadullah (A)</span>
    <span class="badge badge-b"><span class="badge-dot"></span>Sohail (B)</span>
  </div>

  <div class="divider" role="separator"></div>

  <div class="form">
    <form id="loginForm" autocomplete="on" novalidate>
      <!-- hidden username field for browser password manager -->
      <input
        type="text"
        name="username"
        value="partnership"
        autocomplete="username"
        style="display:none;position:absolute;opacity:0;pointer-events:none;"
        aria-hidden="true"
        tabindex="-1"
      >

      <div class="field">
        <label class="field-label" for="passwordInput">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="1" y="5" width="10" height="7" rx="1.5"/>
            <path d="M4 5V3.5a2 2 0 014 0V5"/>
          </svg>
          Password
        </label>
        <div class="input-wrap">
          <input
            class="input"
            type="password"
            id="passwordInput"
            name="password"
            placeholder="Enter partnership password"
            autocomplete="current-password"
            spellcheck="false"
            required
          >
          <div class="input-suffix">
            <button
              type="button"
              class="pw-toggle"
              id="pwToggle"
              aria-label="Toggle password visibility"
              title="Show / hide password"
            >
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <button class="btn" type="submit" id="loginBtn">
        <div class="btn-inner">
          <span>Access Dashboard</span>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
        </div>
        <div class="btn-spinner" role="status" aria-label="Logging in..."></div>
      </button>
    </form>

    <div class="feedback error-msg" id="errorMsg" role="alert" aria-live="polite">
      <span class="feedback-icon">✕</span>
      <span id="errorText">غلط پاسورڈ — یہ صرف Yadullah اور Sohail کے لیے ہے۔</span>
    </div>

    <div class="feedback success-msg" id="successMsg" role="status" aria-live="polite">
      <span class="feedback-icon">✓</span>
      <span>Verified! Redirecting to dashboard…</span>
    </div>
  </div>

  <footer class="footer">
    <p class="footer-text">
      <svg class="lock-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      Yadullah &amp; Sohail only · End-to-end secured
    </p>
  </footer>

</main>

<script>
(function () {
  'use strict';

  /* ── Config ── */
  const CORRECT_PASSWORD = "YadullahSohail2025"; // ✅ آپ یہ پاسورڈ بدل سکتے ہیں
  const REDIRECT_URL = "https://script.google.com/macros/s/AKfycbymELqzbL0e72ZkorNXO7EpjJJMQ-gENxQq7dn7TtC2NbwnDOl4HS9bYUwkLBw6b0mz/exec";

  /* ── Elements ── */
  const form       = document.getElementById('loginForm');
  const input      = document.getElementById('passwordInput');
  const btn        = document.getElementById('loginBtn');
  const pwToggle   = document.getElementById('pwToggle');
  const eyeIcon    = document.getElementById('eyeIcon');
  const errorEl    = document.getElementById('errorMsg');
  const successEl  = document.getElementById('successMsg');

  /* Eye SVG paths */
  const EYE_OPEN = `
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>`;
  const EYE_CLOSED = `
    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
    <line x1="1" y1="1" x2="23" y2="23"/>`;

  /* ── Password toggle ── */
  let pwVisible = false;
  pwToggle.addEventListener('click', () => {
    pwVisible = !pwVisible;
    input.type = pwVisible ? 'text' : 'password';
    eyeIcon.innerHTML = pwVisible ? EYE_CLOSED : EYE_OPEN;
    pwToggle.setAttribute('aria-label', pwVisible ? 'Hide password' : 'Show password');
  });

  /* ── Clear error on input ── */
  input.addEventListener('input', () => {
    if (input.classList.contains('error')) {
      input.classList.remove('error');
      hide(errorEl);
    }
  });

  /* ── Form submit ── */
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const val = input.value;

    if (!val) {
      shakeInput();
      input.focus();
      return;
    }

    setLoading(true);

    /* Small intentional delay: gives visual loading feedback even on fast CPUs */
    setTimeout(() => {
      if (val === CORRECT_PASSWORD) {
        onSuccess();
      } else {
        onError();
      }
    }, 600);
  });

  function onSuccess() {
    setLoading(false);
    hide(errorEl);
    show(successEl);
    btn.disabled = true;
    input.disabled = true;

    /* Let browser password manager do its job, then redirect */
    setTimeout(() => {
      window.location.href = REDIRECT_URL;
    }, 900);
  }

  function onError() {
    setLoading(false);
    hide(successEl);
    shakeInput();
    show(errorEl);
    input.value = '';
    input.focus();
  }

  function shakeInput() {
    input.classList.remove('error');
    /* Force reflow to restart animation */
    void input.offsetWidth;
    input.classList.add('error');
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function show(el) {
    el.classList.add('show');
  }

  function hide(el) {
    el.classList.remove('show');
  }

  /* ── Autofocus on load ── */
  requestAnimationFrame(() => input.focus());

})();
</script>
</body>
</html>
